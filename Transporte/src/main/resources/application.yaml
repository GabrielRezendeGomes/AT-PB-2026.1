spring:
  application:
    name: Transporte
  datasource:
    url: jdbc:h2:mem:transporte_db
    driverClassName: org.h2.Driver
    username: sa
    password:

    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
        ddl-auto: update

    h2:
      console:
        enabled: true

    rabbitmq:
      host: localhost
      port: 5672
      username: guest
      password: guest
